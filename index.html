<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EasonTechno 的作品展示</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 2rem 1rem;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 3rem;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .subtitle {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
        }

        .project-card {
            background: white;
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .project-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
        }

        .project-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .project-title {
            font-size: 1.3rem;
            font-weight: 600;
            color: #333;
            margin-bottom: 0.5rem;
        }

        .project-description {
            color: #666;
            font-size: 0.95rem;
            margin-bottom: 1rem;
            line-height: 1.5;
        }

        .project-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 1.2rem;
        }

        .tag {
            background: #f0f0f0;
            padding: 0.25rem 0.6rem;
            border-radius: 20px;
            font-size: 0.75rem;
            color: #555;
        }

        .view-btn {
            display: inline-block;
            width: 100%;
            text-align: center;
            padding: 0.7rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-weight: 500;
            transition: opacity 0.3s ease;
        }

        .view-btn:hover {
            opacity: 0.9;
        }

        footer {
            text-align: center;
            margin-top: 3rem;
            color: rgba(255,255,255,0.8);
            font-size: 0.9rem;
        }

        footer a {
            color: white;
            text-decoration: underline;
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 2rem;
            }
            .projects-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🚀 EasonTechno</h1>
            <p class="subtitle">Demo 作品集 · 展示我的创意项目</p>
        </header>

        <div class="projects-grid">
            <!-- 趣味注册程序 -->
            <div class="project-card">
                <div class="project-icon">📱</div>
                <h3 class="project-title">趣味注册程序</h3>
                <p class="project-description">一个有趣的多步骤注册表单，带有滑块选择手机号、密码强度验证等交互效果。</p>
                <div class="project-tags">
                    <span class="tag">HTML</span>
                    <span class="tag">CSS</span>
                    <span class="tag">JavaScript</span>
                    <span class="tag">交互</span>
                </div>
                <a href="./FunRegistration/" class="view-btn">查看 Demo</a>
            </div>

            <!-- 更多项目可以在这里继续添加 -->
            <div class="project-card">
                <div class="project-icon">✨</div>
                <h3 class="project-title">更多项目即将到来</h3>
                <p class="project-description">持续更新中，敬请期待... </p>
                <div class="project-tags">
                    <span class="tag">Coming Soon</span>
                </div>
                <a href="#" class="view-btn" style="opacity: 0.5; pointer-events: none;">待添加</a>
            </div>
        </div>

        <footer>
            <p>Hosted on <a href="https://pages.github.com/">GitHub Pages</a> · Built with ❤️</p>
        </footer>
    </div>
</body>
</html>
